<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>注册表单</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        .card { max-width: 500px; margin: auto; background: #f9f9f9; padding: 20px; border-radius: 10px; }
        input, textarea, select { width: 100%; padding: 8px; margin: 5px 0 15px 0; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #4CAF50; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; width: 100%; }
        .back { text-align: center; margin-top: 15px; }
        .back a { color: #4CAF50; }
    </style>
</head>
<body>
    <div class="card">
        <h2>用户注册</h2>
        <form id="form">
            <label>昵称：</label>
            <input type="text" id="nickname" required>
            
            <label>密码：</label>
            <input type="password" id="password" required>
            
            <label>邮箱：</label>
            <input type="email" id="email" value="@qq.com" required>
            
            <label>性别：</label>
            <input type="radio" name="gender" value="男" checked> 男
            <input type="radio" name="gender" value="女"> 女
            
            <label>爱好：</label>
            <input type="checkbox" value="旅游"> 旅游
            <input type="checkbox" value="摄影"> 摄影
            <input type="checkbox" value="运动"> 运动
            
            <label>个人简介：</label>
            <textarea id="bio" rows="3"></textarea>
            
            <label>上传个人照片：</label>
            <input type="file" id="photo">
            <div id="fileName" style="color: #999; font-size: 12px;">未选择任何文件</div>
            
            <button type="submit">立即注册</button>
        </form>
        <div class="back"><a href="index.html">← 返回简历</a></div>
        <div id="msg" style="margin-top: 10px; text-align: center; display: none;"></div>
    </div>
    
    <script>
        document.getElementById('photo').onchange = function(e) {
            document.getElementById('fileName').innerText = e.target.files[0] ? e.target.files[0].name : '未选择任何文件';
        };
        
        document.getElementById('form').onsubmit = function(e) {
            e.preventDefault();
            let nickname = document.getElementById('nickname').value;
            let password = document.getElementById('password').value;
            let email = document.getElementById('email').value;
            
            if(!nickname || !password || !email) {
                alert('请填写完整信息');
                return;
            }
            
            let hobbies = [];
            document.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => hobbies.push(cb.value));
            
            let msg = document.getElementById('msg');
            msg.innerText = '注册成功！';
            msg.style.display = 'block';
            msg.style.background = '#d4edda';
            msg.style.padding = '10px';
            msg.style.borderRadius = '5px';
            
            setTimeout(() => {
                if(confirm('注册成功！返回简历页面？')) {
                    window.location.href = 'index.html';
                }
            }, 500);
        };
    </script>
</body>
</html>
